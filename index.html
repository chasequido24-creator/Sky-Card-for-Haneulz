<!DOCTYPE html>
<html>
<head>
    <title>Sky Card for Haneulz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap');
        body {
            background: #f7f5ff;
            font-family: 'Nunito', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        #cardHolder {
            width: 220px;
            height: 310px;
            perspective: 1600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flip-card {
            width: 220px;
            height: 310px;
            position: relative;
            background: transparent;
            cursor: pointer;
            transform-style: preserve-3d;
            box-shadow: 0 4px 14px rgba(170,130,255,0.11), 0 2px 8px #ece6ff;
            transition: transform 0.6s cubic-bezier(.65,.10,.32,1.71), translate 0.3s;
            user-select: none;
            touch-action: none;
        }
        .flipped {
            transform: rotateY(180deg);
        }
        .flip-card.swiped {
            transition: transform 0.3s, translate 0.5s;
            z-index: 10;
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            box-shadow: 0 1px 6px rgba(170,130,255,0.07);
            overflow: hidden;
        }
        .flip-card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            pointer-events: none;
            user-select: none;
        }
        .flip-card-front {
            transform: rotateY(180deg);
            background: #fff;
        }
        .flip-card-back {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(210deg, #fdeff8 40%, #a882ff 100%);
        }
        .flip-card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            pointer-events: none;
            user-select: none;
        }
        #editTrigger { 
            display:none; 
            font-family: 'Nunito', Arial, sans-serif;
            font-weight: bold;
            background: #a882ff;
            color: #fff;
            border-radius: 14px;
            font-size: 1.02em;
            padding: 9px 20px;
            margin-top: 17px;
            box-shadow: 0 3px 10px #ece6ff;
            border: none;
            letter-spacing: 1px;
            cursor: pointer;
        }
        #editPanel {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(16,16,16,.96);
            color: #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 38px;
            z-index: 1000;
            overflow: auto;
        }
        #editPanel h2 { margin-bottom: 19px; letter-spacing: 2px;}
        #adminUploads { margin-bottom: 18px; }
        #adminNavigation {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
        }
        #albumAdminImg {
            width: 112px;
            height: 112px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #a882ff;
            background: #232332;
            margin: 0 10px;
        }
        #albumAdminPrev, #albumAdminNext {
            padding: 7px 18px;
            border-radius: 20px;
            background: #a882ff;
            border: none;
            color: #fff;
            font-size: 1.12em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.21s;
        }
        #albumAdminPrev:hover, #albumAdminNext:hover { background: #ffa7c9; }
        #albumAdminRemove {
            margin-left: 14px;
            padding: 7px 14px;
            background: #ffa7c9;
            color: #fff;
            border: none;
            border-radius: 9px;
            font-weight: bold;
            font-size:1em;
        }
        #albumCount {
            font-size: 0.95em;
            margin-right: 12px;
            font-family: 'Nunito', Arial;
            color: #e0cdfa;
        }
        #buttonSkinEdit, #backSkinEdit, #audioEdit {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #editBtnTxt {
            margin-left: 9px;
            font-size: 1em;
            border-radius: 8px;
            font-family: 'Nunito', Arial;
            border: none;
            padding: 5px 13px;
            letter-spacing: 1.5px;
        }
        #audioUrl, #audioName {
            font-size: 1em;
            border-radius: 8px;
            border: none;
            margin-left: 8px;
            width: 350px;
            background: #ece6ff;
            color: #5850a0;
            padding: 2px 8px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div id="cardHolder"></div>
    <!-- Editor/admin UI (hidden unless unlocked) -->
    <button id="editTrigger">ADMIN EDIT</button>
    <div id="editPanel">
        <h2>Card Game Admin</h2>
        <!-- Card image uploads -->
        <div id="adminUploads">
            <input type="file" id="uploadPhotos" multiple accept="image/*">
            <span>Add card images</span>
        </div>
        <!-- Photo navigation / remove -->
        <div id="adminNavigation">
            <button id="albumAdminPrev">&laquo;</button>
            <img id="albumAdminImg">
            <span id="albumCount"></span>
            <button id="albumAdminNext">&raquo;</button>
            <button id="albumAdminRemove">Remove</button>
        </div>
        <!-- Card back skin upload -->
        <div id="backSkinEdit">
            <input type="file" id="uploadBackSkin" accept="image/*">
            <span>Edit card back skin</span>
        </div>
        <!-- Editable PNG button upload & text (retained for admin but not shown to user) -->
        <div id="buttonSkinEdit">
            <input type="file" id="uploadBtnSkin" accept="image/*">
            <span>Edit button image (hidden from users)</span>
            <input type="text" id="editBtnTxt" placeholder="Button Text">
        </div>
        <!-- Audio file upload and audio link -->
        <div id="audioEdit">
            <input type="file" id="uploadAudio" accept="audio/*">
            <span>Upload audio or paste audio link:</span>
            <input type="text" id="audioUrl" placeholder="Paste direct online audio link (mp3/ogg/wav)">
            <span id="audioName"></span>
        </div>
        <button onclick="closeEdit()">DONE</button>
    </div>
<script>
let photos = [], lastIndex = -1, backSkin = "", btnSkin = "", btnText = "FLIP", albumIdx = 0;
let soundtrack = "", soundtrackFile = "", audioName = "";
const cardHolder = document.getElementById("cardHolder");

function saveBtnSkin(){localStorage.setItem("cardgame_btnskin",btnSkin);}
function loadBtnSkin(){btnSkin=localStorage.getItem("cardgame_btnskin")||"";}
function saveBtnText(){localStorage.setItem("cardgame_btntext",btnText);}
function loadBtnText(){btnText=localStorage.getItem("cardgame_btntext")||"FLIP";}
function saveBackSkin(){localStorage.setItem("cardgame_backskin",backSkin||"");}
function loadBackSkin(){backSkin=localStorage.getItem("cardgame_backskin")||"";}
function save(){localStorage.setItem("cardgame_album",JSON.stringify(photos));}
function load(){let data=localStorage.getItem("cardgame_album");if(data)photos=JSON.parse(data);renderAdminNavigation();}
function saveSoundtrack(){
    localStorage.setItem("cardgame_soundtrack",soundtrack||"");
    localStorage.setItem("cardgame_soundtrack_file",soundtrackFile||"");
    localStorage.setItem("cardgame_audio_name",audioName||"");
}
function loadSoundtrack(){
    soundtrack=localStorage.getItem("cardgame_soundtrack")||"";
    soundtrackFile=localStorage.getItem("cardgame_soundtrack_file")||"";
    audioName=localStorage.getItem("cardgame_audio_name")||"";
    document.getElementById("audioName").textContent=audioName?`Loaded: ${audioName}`:"";
}
function renderAdminNavigation(){
    const img=document.getElementById("albumAdminImg"),count=document.getElementById("albumCount");
    if(photos.length>0&&albumIdx>=0&&albumIdx<photos.length){img.src=photos[albumIdx];count.textContent=`Photo ${albumIdx+1} of ${photos.length}`;}
    else{img.src="";count.textContent="No photos";}
}
document.getElementById("albumAdminPrev").onclick=function(){if(photos.length===0)return;albumIdx=(albumIdx-1+photos.length)%photos.length;renderAdminNavigation();};
document.getElementById("albumAdminNext").onclick=function(){if(photos.length===0)return;albumIdx=(albumIdx+1)%photos.length;renderAdminNavigation();};
document.getElementById("albumAdminRemove").onclick=function(){if(photos.length===0||albumIdx<0||albumIdx>=photos.length)return;photos.splice(albumIdx,1);save();albumIdx=Math.max(0,albumIdx-1);renderAdminNavigation();};
// Editor unlock: CTRL+E or type "adminedit"
function showEditTrigger(){document.getElementById("editTrigger").style.display="inline-block";}
window.addEventListener("keydown",function(e){
    if((e.ctrlKey&&e.key==="e")||unlockBuffer==="adminedit"){showEditTrigger();}
    else{unlockBuffer+=e.key;if(unlockBuffer.length>34)unlockBuffer=unlockBuffer.slice(-34);if(unlockBuffer.endsWith("adminedit"))showEditTrigger();}
});
let unlockBuffer="";
document.getElementById("editTrigger").onclick=()=>{
    document.getElementById("editPanel").style.display="flex";
    document.getElementById('editBtnTxt').value=btnText;
    renderAdminNavigation();
    document.getElementById("audioUrl").value=soundtrack;
};
function closeEdit(){document.getElementById("editPanel").style.display="none";}
// Admin uploads card images
document.getElementById("uploadPhotos").onchange=e=>{
    Array.from(e.target.files).forEach(file=>{
        let reader=new FileReader();
        reader.onload=ev=>{photos.push(ev.target.result);save();albumIdx=photos.length-1;renderAdminNavigation();};
        reader.readAsDataURL(file);
    });
};
// Admin uploads card back skin
document.getElementById("uploadBackSkin").onchange=e=>{
    let reader=new FileReader();
    reader.onload=ev=>{backSkin=ev.target.result;saveBackSkin();};
    reader.readAsDataURL(e.target.files[0]);
};
// Admin uploads button PNG skin (hidden from users)
document.getElementById("uploadBtnSkin").onchange=e=>{
    let reader=new FileReader();
    reader.onload=ev=>{btnSkin=ev.target.result;saveBtnSkin();};
    reader.readAsDataURL(e.target.files[0]);
};
// Admin edits button text (hidden from users)
document.getElementById("editBtnTxt").oninput=function(){
    btnText=this.value;saveBtnText();
};
// Admin uploads audio file
document.getElementById("uploadAudio").onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    audioName=file.name;document.getElementById("audioName").textContent=`Loaded: ${audioName}`;
    let reader=new FileReader();reader.onload=ev=>{
        soundtrackFile=ev.target.result;soundtrack="";saveSoundtrack();playSoundtrack();
    };reader.readAsDataURL(file);
};
// Admin pastes audio link
document.getElementById("audioUrl").oninput=function(){
    const url=this.value.trim();soundtrack=url;soundtrackFile="";audioName=url?"[LINK]":"";saveSoundtrack();document.getElementById("audioName").textContent=url?`Loaded: [LINK]`:"";playSoundtrack();
};
// Download image utility
function downloadImage(url){
    const a=document.createElement("a");
    a.href=url;
    a.download="card-image.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// Show floating card, swipe up/down to download (mobile/desktop), click to flip; click again to reset and randomize new card
function showFloatingCard(idxParam) {
    if (photos.length < 1) return;
    let idx;
    if (typeof idxParam === 'number') {
        idx = idxParam;
    } else {
        do {
            idx = Math.floor(Math.random() * photos.length);
        } while (idx === lastIndex && photos.length > 1);
    }
    lastIndex = idx;
    cardHolder.innerHTML = '';
    cardHolder.style.display = "flex";
    const card = document.createElement("div");
    card.className = "flip-card";
    card.innerHTML = `<div class="flip-card-back">${
        backSkin ? `<img src="${backSkin}">` : `<span>?</span>`
    }</div>
    <div class="flip-card-front"><img src="${photos[idx]}"></div>`;
    cardHolder.appendChild(card);

    let startY = null;
    let moved = false;
    let imgUrl = photos[idx];
    let flipped = false;

    // TOUCH: swipe up/down
    card.addEventListener("touchstart", (e) => {
        if (e.touches.length === 1) {
            startY = e.touches[0].clientY;
            moved = false;
        }
    });
    card.addEventListener("touchmove", (e) => {
        if (startY !== null && e.touches.length === 1) {
            const dy = e.touches[0].clientY - startY;
            card.style.transform =
                "translateY(" + dy + "px)" + (flipped ? " rotateY(180deg)" : "");
            moved = Math.abs(dy) > 40;
        }
    });
    card.addEventListener("touchend", (e) => {
        if (startY !== null && moved) {
            card.classList.add("swiped");
            card.style.transform =
                "translateY(" + (card.style.transform.includes("-") ? "-350px" : "350px") + ")" +
                (flipped ? " rotateY(180deg)" : "");
            setTimeout(() => {
                downloadImage(imgUrl);
                card.style.transform = (flipped ? "rotateY(180deg)" : "");
                card.classList.remove("swiped");
            }, 350);
        } else {
            card.style.transform = (flipped ? "rotateY(180deg)" : "");
        }
        startY = null;
    });

    // MOUSE: swipe up/down using click + drag (desktop)
    card.addEventListener("mousedown", (e) => {
        startY = e.clientY; moved = false;
        card.style.transition = "none";
    });
    card.addEventListener("mousemove", (e) => {
        if (startY !== null) {
            const dy = e.clientY - startY;
            card.style.transform =
                "translateY(" + dy + "px)" + (flipped ? " rotateY(180deg)" : "");
            moved = Math.abs(dy) > 40;
        }
    });
    card.addEventListener("mouseup", (e) => {
        if (startY !== null && moved) {
            card.classList.add("swiped");
            card.style.transition = "";
            card.style.transform =
                "translateY(" + (card.style.transform.includes("-") ? "-350px" : "350px") + ")" +
                (flipped ? " rotateY(180deg)" : "");
            setTimeout(() => {
                downloadImage(imgUrl);
                card.style.transform = (flipped ? "rotateY(180deg)" : "");
                card.classList.remove("swiped");
            }, 350);
        } else {
            card.style.transition = "";
            card.style.transform = (flipped ? "rotateY(180deg)" : "");
        }
        startY = null;
    });

    card.onclick = () => {
        if (!flipped) {
            card.classList.add("flipped");
            flipped = true;
        } else {
            // When clicked again, reset to unflipped, and randomize a NEW image!
            card.classList.remove("flipped");
            flipped = false;
            card.style.transition = "";
            card.style.transform = "";
            setTimeout(()=>showFloatingCard(),350); // show a new random card after reset
        }
    }
}

let audioEl=null;
function playSoundtrack(){
    let src=soundtrackFile?soundtrackFile:soundtrack;
    if(!src)return;
    if(audioEl){audioEl.pause();audioEl=null;}
    audioEl=new Audio(src);audioEl.loop=true;audioEl.volume=0.55;
    audioEl.play().catch(()=>{document.body.addEventListener("click",resumeSoundtrack,{once:true});});
}
function resumeSoundtrack(){if(audioEl)audioEl.play();document.body.removeEventListener("click",resumeSoundtrack);}
load();loadBackSkin();loadBtnSkin();loadBtnText();loadSoundtrack();
window.addEventListener("DOMContentLoaded",()=>{
    playSoundtrack();
    showFloatingCard();
});
</script>
</body>
</html>
